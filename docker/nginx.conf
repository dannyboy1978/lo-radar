# ═══════════════════════════════════════════════════════════════════════════
# LO Radar · marketing nginx config
# ═══════════════════════════════════════════════════════════════════════════

# Force apex (strip www) for SEO consolidation
server {
  listen 80;
  server_name www.loradar.com;
  return 301 https://loradar.com$request_uri;
}

server {
  listen 80 default_server;
  server_name loradar.com _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/xml+rss image/svg+xml;
  gzip_min_length 256;

  location / { try_files $uri $uri/ $uri.html =404; }

  location /_astro/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  location = /sitemap-index.xml { add_header Content-Type "application/xml"; }
  location = /sitemap.xml       { add_header Content-Type "application/xml"; }
  location = /robots.txt        { add_header Content-Type "text/plain"; }

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  server_tokens off;
}
